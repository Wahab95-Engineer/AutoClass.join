<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ClassBot — Auto Join</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #ffffff0f;
    --border-hover: #ffffff22;
    --accent: #7c6af7;
    --accent2: #4fc3f7;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --meet: #34a853;
    --zoom: #2d8cff;
    --teams: #6264a7;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content:'';
    position:fixed; inset:0; z-index:0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events:none;
  }

  .app { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:24px 20px; }

  /* Header */
  header {
    display:flex; align-items:center; justify-content:space-between;
    padding: 20px 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 24px;
  }
  .logo { display:flex; align-items:center; gap:12px; }
  .logo-icon {
    width:40px; height:40px; border-radius:10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display:grid; place-items:center; font-size:20px;
  }
  .logo h1 { font-size:1.4rem; font-weight:800; letter-spacing:-0.5px; }
  .logo span { color:var(--accent); }
  .status-pill {
    display:flex; align-items:center; gap:8px;
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size:.8rem; font-family:'JetBrains Mono'; color:var(--muted);
  }
  .status-dot { width:8px; height:8px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* Stats row */
  .stats {
    display:grid; grid-template-columns:repeat(4,1fr); gap:12px;
    margin-bottom:24px;
  }
  .stat-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; padding:18px 20px;
    transition: border-color .2s;
  }
  .stat-card:hover { border-color:var(--border-hover); }
  .stat-label { font-size:.7rem; font-family:'JetBrains Mono'; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
  .stat-value { font-size:2rem; font-weight:800; margin-top:4px; }
  .stat-value.green { color:var(--green); }
  .stat-value.yellow { color:var(--yellow); }
  .stat-value.red { color:var(--red); }
  .stat-value.accent { color:var(--accent); }

  /* Main grid */
  .main-grid { display:grid; grid-template-columns:1fr 360px; gap:20px; }

  /* Panels */
  .panel {
    background:var(--surface); border:1px solid var(--border);
    border-radius:16px; overflow:hidden;
  }
  .panel-header {
    display:flex; align-items:center; justify-content:space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .panel-title { font-size:.85rem; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--muted); }
  .panel-body { padding:16px 20px; }

  /* Tabs */
  .tabs { display:flex; gap:4px; background:var(--bg); border-radius:10px; padding:4px; margin-bottom:16px; }
  .tab {
    flex:1; padding:8px; text-align:center; cursor:pointer;
    border-radius:8px; font-size:.82rem; font-weight:600;
    color:var(--muted); transition:.2s;
    border:none; background:none;
  }
  .tab.active { background:var(--surface2); color:var(--text); }

  /* Meeting List */
  .meeting-list { display:flex; flex-direction:column; gap:8px; max-height:420px; overflow-y:auto; }
  .meeting-list::-webkit-scrollbar { width:4px; }
  .meeting-list::-webkit-scrollbar-track { background:transparent; }
  .meeting-list::-webkit-scrollbar-thumb { background:var(--border-hover); border-radius:4px; }

  .meeting-item {
    display:flex; align-items:center; gap:12px;
    padding:14px; background:var(--surface2);
    border:1px solid var(--border); border-radius:10px;
    transition:.2s;
  }
  .meeting-item:hover { border-color:var(--border-hover); }
  .platform-badge {
    width:36px; height:36px; border-radius:8px;
    display:grid; place-items:center; font-size:16px; flex-shrink:0;
  }
  .platform-badge.meet { background:#34a85322; }
  .platform-badge.zoom { background:#2d8cff22; }
  .platform-badge.teams { background:#6264a722; }
  .meeting-info { flex:1; min-width:0; }
  .meeting-title { font-size:.88rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .meeting-meta { font-size:.72rem; font-family:'JetBrains Mono'; color:var(--muted); margin-top:2px; }
  .meeting-actions { display:flex; gap:6px; }
  .btn-icon {
    width:30px; height:30px; border-radius:7px; border:1px solid var(--border);
    background:transparent; color:var(--muted); cursor:pointer; font-size:13px;
    display:grid; place-items:center; transition:.2s;
  }
  .btn-icon:hover { border-color:var(--accent); color:var(--accent); }
  .btn-icon.danger:hover { border-color:var(--red); color:var(--red); }
  .btn-icon.join:hover { border-color:var(--green); color:var(--green); }

  .status-badge {
    font-size:.65rem; font-family:'JetBrains Mono'; padding:3px 8px;
    border-radius:100px; font-weight:600; flex-shrink:0;
  }
  .status-badge.pending { background:#fbbf2420; color:var(--yellow); }
  .status-badge.joined { background:#4ade8020; color:var(--green); }
  .status-badge.joining { background:#7c6af720; color:var(--accent); }
  .status-badge.failed { background:#f8717120; color:var(--red); }

  .empty-state {
    text-align:center; padding:40px 20px; color:var(--muted);
    font-size:.85rem;
  }
  .empty-state .icon { font-size:2.5rem; margin-bottom:8px; }

  /* Right Panel - Forms */
  .right-col { display:flex; flex-direction:column; gap:16px; }

  /* Form */
  .form-group { margin-bottom:12px; }
  label { display:block; font-size:.72rem; font-family:'JetBrains Mono'; color:var(--muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:.5px; }
  input, select {
    width:100%; padding:10px 12px;
    background:var(--bg); border:1px solid var(--border);
    border-radius:8px; color:var(--text); font-family:'Syne'; font-size:.85rem;
    transition:.2s; outline:none;
  }
  input:focus, select:focus { border-color:var(--accent); }
  select option { background:var(--surface2); }

  .btn {
    width:100%; padding:11px; border:none; border-radius:8px;
    font-family:'Syne'; font-size:.88rem; font-weight:700;
    cursor:pointer; transition:.2s; letter-spacing:.3px;
  }
  .btn-primary { background:linear-gradient(135deg, var(--accent), var(--accent2)); color:#fff; }
  .btn-primary:hover { opacity:.9; transform:translateY(-1px); }
  .btn-secondary { background:var(--surface2); border:1px solid var(--border); color:var(--text); }
  .btn-secondary:hover { border-color:var(--border-hover); }
  .btn:active { transform:translateY(0); }

  /* Accounts list */
  .account-item {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 12px; background:var(--surface2);
    border:1px solid var(--border); border-radius:8px; margin-bottom:6px;
  }
  .account-email { font-size:.82rem; font-family:'JetBrains Mono'; }
  .account-provider { font-size:.65rem; color:var(--muted); }

  /* Logs */
  .log-list { max-height:200px; overflow-y:auto; }
  .log-item {
    display:flex; gap:8px; padding:6px 0;
    border-bottom:1px solid var(--border); font-size:.75rem;
    font-family:'JetBrains Mono';
  }
  .log-item:last-child { border:none; }
  .log-time { color:var(--muted); flex-shrink:0; }
  .log-msg.info { color:var(--text); }
  .log-msg.success { color:var(--green); }
  .log-msg.error { color:var(--red); }
  .log-msg.warning { color:var(--yellow); }

  /* Divider */
  .divider { height:1px; background:var(--border); margin:12px 0; }

  /* Toast */
  #toast {
    position:fixed; bottom:24px; right:24px; z-index:999;
    padding:12px 20px; border-radius:10px;
    background:var(--surface2); border:1px solid var(--border);
    font-size:.85rem; font-weight:600;
    transform:translateY(80px); opacity:0;
    transition:.3s cubic-bezier(.34,1.56,.64,1);
    max-width:320px;
  }
  #toast.show { transform:translateY(0); opacity:1; }
  #toast.success { border-color:var(--green); color:var(--green); }
  #toast.error { border-color:var(--red); color:var(--red); }

  @media (max-width:768px) {
    .main-grid { grid-template-columns:1fr; }
    .stats { grid-template-columns:repeat(2,1fr); }
  }
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">🤖</div>
      <h1>Class<span>Bot</span></h1>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <button class="btn-secondary btn" style="width:auto;padding:8px 16px;font-size:.8rem" onclick="syncEmails()">
        📧 Sync Emails
      </button>
      <div class="status-pill">
        <div class="status-dot"></div>
        Bot Active
      </div>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Total Meetings</div>
      <div class="stat-value accent" id="stat-total">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Pending</div>
      <div class="stat-value yellow" id="stat-pending">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Joined</div>
      <div class="stat-value green" id="stat-joined">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Failed</div>
      <div class="stat-value red" id="stat-failed">0</div>
    </div>
  </div>

  <!-- Main Grid -->
  <div class="main-grid">
    <!-- Left: Meetings -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Meetings</span>
        <button class="btn-icon" onclick="loadMeetings()" title="Refresh">↻</button>
      </div>
      <div class="panel-body">
        <div class="tabs">
          <button class="tab active" onclick="filterMeetings('all', this)">All</button>
          <button class="tab" onclick="filterMeetings('pending', this)">Pending</button>
          <button class="tab" onclick="filterMeetings('joined', this)">Joined</button>
          <button class="tab" onclick="filterMeetings('failed', this)">Failed</button>
        </div>
        <div class="meeting-list" id="meeting-list">
          <div class="empty-state"><div class="icon">📭</div>No meetings yet</div>
        </div>
      </div>
    </div>

    <!-- Right: Controls -->
    <div class="right-col">

      <!-- Add Meeting -->
      <div class="panel">
        <div class="panel-header"><span class="panel-title">Add Meeting</span></div>
        <div class="panel-body">
          <div class="form-group">
            <label>Meeting Title</label>
            <input type="text" id="m-title" placeholder="e.g. DSA Lab Class"/>
          </div>
          <div class="form-group">
            <label>Meeting Link *</label>
            <input type="url" id="m-link" placeholder="Paste Meet/Zoom/Teams URL"/>
          </div>
          <div class="form-group">
            <label>Scheduled Time</label>
            <input type="datetime-local" id="m-time"/>
          </div>
          <div class="form-group">
            <label>Duration (minutes)</label>
            <input type="number" id="m-duration" value="60" min="5" max="480"/>
          </div>
          <button class="btn btn-primary" onclick="addMeeting()">➕ Add Meeting</button>
        </div>
      </div>

      <!-- Email Accounts -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Email Accounts</span>
          <span id="account-count" style="font-size:.75rem;font-family:'JetBrains Mono';color:var(--muted)">0 linked</span>
        </div>
        <div class="panel-body">
          <div id="account-list" style="margin-bottom:12px"></div>
          <div class="divider"></div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="a-email" placeholder="you@gmail.com"/>
          </div>
          <div class="form-group">
            <label>App Password</label>
            <input type="password" id="a-pass" placeholder="App-specific password"/>
          </div>
          <div class="form-group">
            <label>Provider</label>
            <select id="a-provider">
              <option value="gmail">Gmail</option>
              <option value="outlook">Outlook / Hotmail</option>
              <option value="yahoo">Yahoo</option>
            </select>
          </div>
          <button class="btn btn-secondary" onclick="addAccount()">🔗 Link Account</button>
        </div>
      </div>

      <!-- Logs -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Activity Log</span>
          <button class="btn-icon" onclick="loadLogs()">↻</button>
        </div>
        <div class="panel-body">
          <div class="log-list" id="log-list">
            <div style="text-align:center;color:var(--muted);font-size:.8rem;padding:16px">No activity yet</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
let allMeetings = [];
let currentFilter = 'all';

const PLATFORM_ICONS = {
  'Google Meet': { icon:'📹', cls:'meet' },
  'Zoom':        { icon:'🎥', cls:'zoom' },
  'Microsoft Teams': { icon:'💼', cls:'teams' },
};

// ─── API Helpers ─────────────────────────────────────────────
async function api(path, opts={}) {
  const r = await fetch('/api' + path, {
    headers: {'Content-Type':'application/json'},
    ...opts
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({detail:'Unknown error'}));
    throw new Error(err.detail || 'Request failed');
  }
  return r.json();
}

// ─── Toast ──────────────────────────────────────────────────
function toast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `show ${type}`;
  setTimeout(() => t.className = '', 3000);
}

// ─── Stats ──────────────────────────────────────────────────
async function loadStats() {
  try {
    const s = await api('/status');
    document.getElementById('stat-total').textContent = s.total_meetings;
    document.getElementById('stat-pending').textContent = s.pending;
    document.getElementById('stat-joined').textContent = s.joined;
    document.getElementById('stat-failed').textContent = s.failed;
    document.getElementById('account-count').textContent = s.accounts + ' linked';
  } catch(e) {}
}

// ─── Meetings ───────────────────────────────────────────────
async function loadMeetings() {
  try {
    allMeetings = await api('/meetings');
    renderMeetings();
  } catch(e) { toast('Failed to load meetings', 'error'); }
}

function filterMeetings(f, el) {
  currentFilter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderMeetings();
}

function renderMeetings() {
  const list = document.getElementById('meeting-list');
  let filtered = allMeetings;
  if (currentFilter !== 'all') {
    filtered = allMeetings.filter(m => m.status === currentFilter);
  }
  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="icon">📭</div>No ${currentFilter === 'all' ? '' : currentFilter} meetings</div>`;
    return;
  }
  list.innerHTML = filtered.map(m => {
    const p = PLATFORM_ICONS[m.platform] || { icon:'🔗', cls:'meet' };
    const time = m.scheduled_time ? new Date(m.scheduled_time).toLocaleString('en-PK', {
      month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'
    }) : 'No time set';
    return `
      <div class="meeting-item">
        <div class="platform-badge ${p.cls}">${p.icon}</div>
        <div class="meeting-info">
          <div class="meeting-title">${escHtml(m.title || 'Untitled')}</div>
          <div class="meeting-meta">${m.platform} · ${time}</div>
        </div>
        <span class="status-badge ${m.status}">${m.status}</span>
        <div class="meeting-actions">
          ${m.status === 'pending' ? `<button class="btn-icon join" onclick="joinNow(${m.id})" title="Join Now">▶</button>` : ''}
          <button class="btn-icon danger" onclick="deleteMeeting(${m.id})" title="Delete">✕</button>
        </div>
      </div>
    `;
  }).join('');
}

async function addMeeting() {
  const link = document.getElementById('m-link').value.trim();
  const time = document.getElementById('m-time').value;
  if (!link) return toast('Please paste a meeting link', 'error');
  if (!time) return toast('Please set a scheduled time', 'error');
  try {
    await api('/meetings', {
      method:'POST',
      body: JSON.stringify({
        title: document.getElementById('m-title').value || 'Class Meeting',
        link,
        scheduled_time: new Date(time).toISOString(),
        duration_minutes: parseInt(document.getElementById('m-duration').value) || 60,
      })
    });
    toast('✅ Meeting added!');
    document.getElementById('m-link').value = '';
    document.getElementById('m-title').value = '';
    loadMeetings(); loadStats();
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteMeeting(id) {
  try {
    await api(`/meetings/${id}`, { method:'DELETE' });
    toast('Meeting deleted');
    loadMeetings(); loadStats();
  } catch(e) { toast('Failed to delete', 'error'); }
}

async function joinNow(id) {
  try {
    const r = await api('/meetings/join-now', { method:'POST', body: JSON.stringify({meeting_id:id}) });
    toast('🚀 ' + r.message);
    setTimeout(() => { loadMeetings(); loadStats(); loadLogs(); }, 2000);
  } catch(e) { toast(e.message, 'error'); }
}

// ─── Accounts ───────────────────────────────────────────────
async function loadAccounts() {
  try {
    const accounts = await api('/accounts');
    const list = document.getElementById('account-list');
    if (!accounts.length) {
      list.innerHTML = '<div style="font-size:.8rem;color:var(--muted);text-align:center;padding:8px">No accounts linked</div>';
      return;
    }
    list.innerHTML = accounts.map(a => `
      <div class="account-item">
        <div>
          <div class="account-email">${escHtml(a.email)}</div>
          <div class="account-provider">${a.provider.toUpperCase()}</div>
        </div>
        <button class="btn-icon danger" onclick="deleteAccount(${a.id})" title="Remove">✕</button>
      </div>
    `).join('');
  } catch(e) {}
}

async function addAccount() {
  const email = document.getElementById('a-email').value.trim();
  const pass  = document.getElementById('a-pass').value;
  const prov  = document.getElementById('a-provider').value;
  if (!email || !pass) return toast('Fill in email and password', 'error');
  try {
    await api('/accounts', { method:'POST', body: JSON.stringify({ email, password:pass, provider:prov }) });
    toast('✅ Account linked!');
    document.getElementById('a-email').value = '';
    document.getElementById('a-pass').value = '';
    loadAccounts(); loadStats();
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteAccount(id) {
  try {
    await api(`/accounts/${id}`, { method:'DELETE' });
    toast('Account removed');
    loadAccounts(); loadStats();
  } catch(e) { toast('Failed to remove', 'error'); }
}

async function syncEmails() {
  try {
    await api('/accounts/sync', { method:'POST' });
    toast('📧 Email sync started...');
    setTimeout(() => { loadMeetings(); loadStats(); loadLogs(); }, 5000);
  } catch(e) { toast(e.message, 'error'); }
}

// ─── Logs ───────────────────────────────────────────────────
async function loadLogs() {
  try {
    const logs = await api('/logs?limit=30');
    const list = document.getElementById('log-list');
    if (!logs.length) {
      list.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:.8rem;padding:16px">No activity yet</div>';
      return;
    }
    list.innerHTML = logs.map(l => {
      const t = new Date(l.created_at).toLocaleTimeString('en-PK', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
      return `<div class="log-item">
        <span class="log-time">${t}</span>
        <span class="log-msg ${l.level}">${escHtml(l.message)}</span>
      </div>`;
    }).join('');
  } catch(e) {}
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Init ────────────────────────────────────────────────────
function init() {
  loadStats();
  loadMeetings();
  loadAccounts();
  loadLogs();
  // Auto-refresh every 30s
  setInterval(() => { loadStats(); loadMeetings(); loadLogs(); }, 30000);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
